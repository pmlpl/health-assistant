spring.application.name=HealthAssistant
server.port=8080

# 默认使用 dev 配置（本地开发）
spring.profiles.default=dev

# HTTP Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/health_assistant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Configuration
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA 通用配置（ddl-auto 由 profile 决定）
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Actuator：健康检查与 Hikari 连接池指标
management.endpoints.web.exposure.include=health,metrics,hikaricp
management.endpoint.health.show-details=when_authorized

# JWT 鉴权（生产环境务必设置 JWT_SECRET 为长随机字符串）
jwt.secret=${JWT_SECRET:dev-only-change-me-before-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS 白名单（逗号分隔）
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# 是否初始化测试账号（生产环境应设为 false）
app.seed-test-user=${APP_SEED_TEST_USER:true}

# AI API Keys Configuration（prod 建议留空，由用户在「AI 设置」自备）
doubao.api.key=${DOUBAO_API_KEY:}
doubao.model.name=doubao-seed-1-8-251228
# 拍照识食专用视觉模型（勿与上方文本模型混用；火山方舟可填 ep- 接入点 ID）
# 拍照识食：火山方舟视觉接入点 ep-（DOUBAO_VISION_MODEL）
doubao.vision.model.name=${DOUBAO_VISION_MODEL:ep-20260529143011-9jk6q}
dashscope.api.key=${DASHSCOPE_API_KEY:}
deepseek.api.key=${DEEPSEEK_API_KEY:}
doubao.image.model.name=${DOUBAO_IMAGE_MODEL:doubao-seedream-5-0-lite-260128}
doubao.image.size=${DOUBAO_IMAGE_SIZE:2K}

# AI 路由与上传
ai.settings.encryption-secret=${AI_SETTINGS_SECRET:}
ai.deployment-mode=${AI_DEPLOYMENT_MODE:dev}
ai.provider.default=${AI_PROVIDER_DEFAULT:lmstudio}
ai.lmstudio.base-url=${AI_LMSTUDIO_BASE_URL:http://127.0.0.1:1234/v1}
ai.lmstudio.model=${AI_LMSTUDIO_MODEL:qwen3.5-9b}
ai.lmstudio.connect-timeout-seconds=${AI_LMSTUDIO_CONNECT_TIMEOUT:90}
ai.require-user-config=${AI_REQUIRE_USER_CONFIG:false}
ai.dashscope.default-model=${AI_DASHSCOPE_MODEL:qwen-plus}
# 拍照识食：优先豆包 → 本地 LM 视觉 → 通义轻量视觉（见 ai.image.recognition.order）
ai.image.recognition.order=${AI_IMAGE_RECOGNITION_ORDER:doubao,lmstudio,dashscope}
ai.image.recognition.max-side=${AI_IMAGE_MAX_SIDE:768}
ai.lmstudio.vision-model=${AI_LMSTUDIO_VISION_MODEL:}
ai.dashscope.vision-model=${AI_DASHSCOPE_VISION_MODEL:qwen-vl-flash}
ai.deepseek.default-model=${AI_DEEPSEEK_MODEL:deepseek-v4-flash}
ai.doubao.default-model=${AI_DOUBAO_CHAT_MODEL:doubao-seed-1-8-251228}
ai.chat.max-history-messages=${AI_CHAT_MAX_HISTORY:24}
ai.chat.max-tokens=${AI_CHAT_MAX_TOKENS:1024}
ai.recipe.max-tokens=${AI_RECIPE_MAX_TOKENS:4096}
ai.consult.stream-enabled=${AI_CONSULT_STREAM_ENABLED:true}
ai.consult.sse-timeout-ms=${AI_CONSULT_SSE_TIMEOUT_MS:600000}
ai.consult.stream-idle-timeout-seconds=${AI_CONSULT_STREAM_IDLE_TIMEOUT:120}
# 平台试用代付（新用户有限次数，用尽后须自备 Key）
ai.platform.trial-enabled=${AI_PLATFORM_TRIAL_ENABLED:true}
ai.platform.trial.text-quota=${AI_PLATFORM_TRIAL_TEXT_QUOTA:0}
ai.platform.trial.image-quota=${AI_PLATFORM_TRIAL_IMAGE_QUOTA:10}
ai.platform.trial.recipe-image-quota=${AI_PLATFORM_TRIAL_RECIPE_IMAGE_QUOTA:10}
# 开发 profile 在 application-dev.properties 中设为 false，避免 LM 失败时静默切云端
ai.auto.fallback-cloud=${AI_AUTO_FALLBACK_CLOUD:false}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

# 文件上传限制
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

