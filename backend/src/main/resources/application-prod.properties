# 生产环境：禁止 Hibernate 改表，由 Flyway 管理版本

app.seed-test-user=false

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# 平台代付：DeepSeek 对话 + 豆包识图/生图；用户可自备 Key 覆盖
ai.deployment-mode=prod
ai.provider.default=deepseek
ai.require-user-config=false
ai.platform.trial-enabled=true
ai.platform.trial.text-quota=0
ai.platform.trial.image-quota=10
ai.platform.trial.recipe-image-quota=10
